version: '3.9'

networks:
  oneview-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ml_models:
    driver: local

services:

  # =============================================
  # DATABASE
  # =============================================
  postgres:
    image: postgres:15-alpine
    container_name: oneview-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oneview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneview_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-oneview_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-loader/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    networks:
      - oneview-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneview -d oneview_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================
  # DATA LOADER (runs once to seed data)
  # =============================================
  data-loader:
    build:
      context: ./data-loader
      dockerfile: Dockerfile
    container_name: oneview-data-loader
    environment:
      DATABASE_URL: postgresql://oneview:oneview_secure_2024@postgres:5432/oneview_db
    volumes:
      - ./data-loader:/app
    networks:
      - oneview-network
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "load_to_postgres.py"]
    restart: "no"

  # =============================================
  # HOTEL SERVICE
  # =============================================
  hotel-service:
    build:
      context: ./hotel-service
      dockerfile: Dockerfile
    container_name: oneview-hotel
    environment:
      DATABASE_URL: postgresql://oneview:oneview_secure_2024@postgres:5432/oneview_db
      SERVICE_NAME: hotel-service
      LOG_LEVEL: INFO
    ports:
      - "8001:8001"
    networks:
      - oneview-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # RESTAURANT SERVICE
  # =============================================
  restaurant-service:
    build:
      context: ./restaurant-service
      dockerfile: Dockerfile
    container_name: oneview-restaurant
    environment:
      DATABASE_URL: postgresql://oneview:oneview_secure_2024@postgres:5432/oneview_db
      SERVICE_NAME: restaurant-service
      LOG_LEVEL: INFO
    ports:
      - "8002:8002"
    networks:
      - oneview-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # REAL ESTATE SERVICE
  # =============================================
  realestate-service:
    build:
      context: ./realestate-service
      dockerfile: Dockerfile
    container_name: oneview-realestate
    environment:
      DATABASE_URL: postgresql://oneview:oneview_secure_2024@postgres:5432/oneview_db
      SERVICE_NAME: realestate-service
      LOG_LEVEL: INFO
    ports:
      - "8003:8003"
    networks:
      - oneview-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # ANALYTICS SERVICE (ML/AI)
  # =============================================
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: oneview-analytics
    environment:
      DATABASE_URL: postgresql://oneview:oneview_secure_2024@postgres:5432/oneview_db
      SERVICE_NAME: analytics-service
      MODEL_PATH: /app/models
      LOG_LEVEL: INFO
    ports:
      - "8004:8004"
    volumes:
      - ml_models:/app/models
    networks:
      - oneview-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # CHATBOT SERVICE
  # =============================================
  chatbot-service:
    build:
      context: ./chatbot-service
      dockerfile: Dockerfile
    container_name: oneview-chatbot
    environment:
      DATABASE_URL: postgresql://oneview:oneview_secure_2024@postgres:5432/oneview_db
      HOTEL_SERVICE_URL: http://hotel-service:8001
      RESTAURANT_SERVICE_URL: http://restaurant-service:8002
      REALESTATE_SERVICE_URL: http://realestate-service:8003
      ANALYTICS_SERVICE_URL: http://analytics-service:8004
      LOG_LEVEL: INFO
    ports:
      - "8005:8005"
    networks:
      - oneview-network
    depends_on:
      - hotel-service
      - restaurant-service
      - realestate-service
      - analytics-service
    restart: unless-stopped

  # =============================================
  # API GATEWAY
  # =============================================
  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    container_name: oneview-gateway
    environment:
      HOTEL_SERVICE_URL: http://hotel-service:8001
      RESTAURANT_SERVICE_URL: http://restaurant-service:8002
      REALESTATE_SERVICE_URL: http://realestate-service:8003
      ANALYTICS_SERVICE_URL: http://analytics-service:8004
      CHATBOT_SERVICE_URL: http://chatbot-service:8005
      JWT_SECRET: ${JWT_SECRET:-oneview_jwt_secret_change_in_prod}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    networks:
      - oneview-network
    depends_on:
      - hotel-service
      - restaurant-service
      - realestate-service
      - analytics-service
    restart: unless-stopped

  # =============================================
  # DASHBOARD UI (React)
  # =============================================
  dashboard-ui:
    build:
      context: ./dashboard-ui
      dockerfile: Dockerfile
    container_name: oneview-dashboard
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    networks:
      - oneview-network
    depends_on:
      - gateway-api
    restart: unless-stopped
