<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>OneView Hospitality Platform — Architecture Diagram</title>
  <desc>Microservices architecture showing 8 services with Docker, PostgreSQL, and React frontend</desc>
  <rect width="900" height="560" fill="#0f1117" rx="12"/>
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="Inter,sans-serif" font-size="18" font-weight="700" letter-spacing="1">OneView Hospitality Platform — Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="Inter,sans-serif" font-size="12">8 microservices · Docker Compose · PostgreSQL · React · 3 ML models</text>
  <rect x="325" y="78" width="250" height="46" rx="8" fill="#1e2130" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="97" text-anchor="middle" fill="#818cf8" font-family="Inter,sans-serif" font-size="13" font-weight="700">React Dashboard</text>
  <text x="450" y="113" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 3000 · Vite · Recharts</text>
  <line x1="450" y1="124" x2="450" y2="152" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <rect x="295" y="152" width="310" height="52" rx="8" fill="#1e2130" stroke="#6366f1" stroke-width="2.5"/>
  <text x="450" y="173" text-anchor="middle" fill="#a5b4fc" font-family="Inter,sans-serif" font-size="14" font-weight="700">API Gateway</text>
  <text x="450" y="191" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 8000 · JWT Auth · Reverse Proxy · FastAPI</text>
  <rect x="640" y="152" width="190" height="52" rx="8" fill="#1e2130" stroke="#ec4899" stroke-width="1.5"/>
  <text x="735" y="173" text-anchor="middle" fill="#f472b6" font-family="Inter,sans-serif" font-size="13" font-weight="700">Chatbot Service</text>
  <text x="735" y="191" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 8005 · NLP intents · Web UI</text>
  <line x1="605" y1="178" x2="640" y2="178" stroke="#ec4899" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPink)"/>
  <line x1="330" y1="204" x2="200" y2="280" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <line x1="400" y1="204" x2="380" y2="280" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <line x1="500" y1="204" x2="520" y2="280" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="204" x2="660" y2="280" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <rect x="80" y="280" width="190" height="58" rx="8" fill="#1e2130" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="175" y="302" text-anchor="middle" fill="#38bdf8" font-family="Inter,sans-serif" font-size="13" font-weight="700">Hotel Service</text>
  <text x="175" y="317" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 8001 · KPIs · Rooms</text>
  <text x="175" y="330" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">Reservations · Channels</text>
  <rect x="290" y="280" width="190" height="58" rx="8" fill="#1e2130" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="385" y="302" text-anchor="middle" fill="#f59e0b" font-family="Inter,sans-serif" font-size="13" font-weight="700">Restaurant Service</text>
  <text x="385" y="317" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 8002 · Sales · Menu</text>
  <text x="385" y="330" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">Top Products · Trends</text>
  <rect x="500" y="280" width="190" height="58" rx="8" fill="#1e2130" stroke="#10b981" stroke-width="1.5"/>
  <text x="595" y="302" text-anchor="middle" fill="#10b981" font-family="Inter,sans-serif" font-size="13" font-weight="700">Real Estate Service</text>
  <text x="595" y="317" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 8003 · Funnel · Units</text>
  <text x="595" y="330" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">Leads · Projects</text>
  <rect x="705" y="280" width="150" height="58" rx="8" fill="#1e2130" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="780" y="302" text-anchor="middle" fill="#a78bfa" font-family="Inter,sans-serif" font-size="13" font-weight="700">Analytics (ML)</text>
  <text x="780" y="317" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 8004 · Forecast</text>
  <text x="780" y="330" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">Classifier · Scoring</text>
  <line x1="175" y1="338" x2="280" y2="400" stroke="#4b5563" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="385" y1="338" x2="400" y2="400" stroke="#4b5563" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="595" y1="338" x2="520" y2="400" stroke="#4b5563" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="735" y1="338" x2="500" y2="400" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowGray)"/>
  <rect x="230" y="400" width="340" height="58" rx="8" fill="#1e2130" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="423" text-anchor="middle" fill="#fb923c" font-family="Inter,sans-serif" font-size="14" font-weight="700">PostgreSQL 15</text>
  <text x="400" y="440" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="10">port 5432 · schemas: hotel · restaurant · realestate · analytics</text>
  <text x="400" y="452" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="9">24 months synthetic data · Bolivian seasonality</text>
  <rect x="640" y="400" width="150" height="58" rx="8" fill="#161926" stroke="#4b5563" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="715" y="422" text-anchor="middle" fill="#64748b" font-family="Inter,sans-serif" font-size="12" font-weight="600">Data Loader</text>
  <text x="715" y="437" text-anchor="middle" fill="#374151" font-family="Inter,sans-serif" font-size="10">seed job · one-time</text>
  <text x="715" y="450" text-anchor="middle" fill="#374151" font-family="Inter,sans-serif" font-size="10">15k+ records</text>
  <line x1="640" y1="429" x2="570" y2="429" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowGray)"/>
  <rect x="78" y="398" width="140" height="60" rx="8" fill="#161926" stroke="#4b5563" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="148" y="418" text-anchor="middle" fill="#64748b" font-family="Inter,sans-serif" font-size="11" font-weight="600">ML Models</text>
  <text x="148" y="433" text-anchor="middle" fill="#374151" font-family="Inter,sans-serif" font-size="9">GradientBoosting (hotel)</text>
  <text x="148" y="446" text-anchor="middle" fill="#374151" font-family="Inter,sans-serif" font-size="9">RandomForest (restaurant)</text>
  <text x="148" y="459" text-anchor="middle" fill="#374151" font-family="Inter,sans-serif" font-size="9">GBC classifier (leads)</text>
  <rect x="80" y="490" width="740" height="52" rx="6" fill="#161926" stroke="#2d3148" stroke-width="1"/>
  <text x="104" y="510" fill="#94a3b8" font-family="Inter,sans-serif" font-size="11" font-weight="600">Stack:</text>
  <text x="150" y="510" fill="#64748b" font-family="Inter,sans-serif" font-size="11">Python 3.11 · FastAPI · SQLAlchemy 2.0 · scikit-learn 1.3</text>
  <text x="500" y="510" fill="#64748b" font-family="Inter,sans-serif" font-size="11">React 18 · Recharts · Docker Compose · JWT</text>
  <text x="104" y="528" fill="#94a3b8" font-family="Inter,sans-serif" font-size="11" font-weight="600">Repo:</text>
  <text x="150" y="528" fill="#6366f1" font-family="Inter,sans-serif" font-size="11">github.com/aDavidBravo/oneview-hospitality-platform</text>
